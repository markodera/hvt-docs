components:
  schemas:
    APIKeyCreate:
      type: object
      description: Serializer for creating API Keys.  Returns the full key only on
        creation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Friendly name for this key
          maxLength: 225
        environment:
          allOf:
          - $ref: '#/components/schemas/EnvironmentEnum'
          default: test
          description: |-
            'test' for sandbox, 'live' for production

            * `test` - Test
            * `live` - Live
        scopes:
          description: 'list of allowed scopes: [''users:read'', ''users:write'',
            ''auth:*'']'
        expires_at:
          type: string
          format: date-time
          nullable: true
        project:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        project_name:
          type: string
          readOnly: true
          nullable: true
        project_slug:
          type: string
          readOnly: true
          nullable: true
        key:
          type: string
          readOnly: true
          description: Full API Key (Shown only once)
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - key
      - name
      - project
      - project_name
      - project_slug
    APIKeyCreateRequest:
      type: object
      description: Serializer for creating API Keys.  Returns the full key only on
        creation.
      properties:
        name:
          type: string
          minLength: 1
          description: Friendly name for this key
          maxLength: 225
        environment:
          allOf:
          - $ref: '#/components/schemas/EnvironmentEnum'
          default: test
          description: |-
            'test' for sandbox, 'live' for production

            * `test` - Test
            * `live` - Live
        scopes:
          description: 'list of allowed scopes: [''users:read'', ''users:write'',
            ''auth:*'']'
        expires_at:
          type: string
          format: date-time
          nullable: true
        project_id:
          type: string
          format: uuid
          writeOnly: true
          description: Optional project ID. Defaults to the organization's default
            project.
      required:
      - name
    APIKeyList:
      type: object
      description: Serializer for listing API Keys (no sensitive data).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Friendly name for this key
          maxLength: 225
        prefix:
          type: string
          readOnly: true
        environment:
          allOf:
          - $ref: '#/components/schemas/EnvironmentEnum'
          readOnly: true
          description: |-
            Test keys only access test data, live keys access production data

            * `test` - Test
            * `live` - Live
        environment_display:
          type: string
          readOnly: true
        project:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        project_name:
          type: string
          readOnly: true
          nullable: true
        project_slug:
          type: string
          readOnly: true
          nullable: true
        scopes:
          description: 'list of allowed scopes: [''users:read'', ''users:write'',
            ''auth:*'']'
        is_active:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - environment
      - environment_display
      - id
      - last_used_at
      - name
      - prefix
      - project
      - project_name
      - project_slug
    APIKeyListRequest:
