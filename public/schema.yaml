          readOnly: true
          nullable: true
        success_count:
          type: integer
          readOnly: true
        failure_count:
          type: integer
          readOnly: true
        consecutive_failures:
          type: integer
          readOnly: true
          description: Consecutive failed deliveries. Webhook auto-disables at 10.
      required:
      - consecutive_failures
      - created_at
      - failure_count
      - id
      - last_triggered_at
      - project
      - project_name
      - project_slug
      - secret
      - success_count
      - url
    WebhookDelivery:
      type: object
      description: Read-only serializer for webhook delivery attempts.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_type:
          type: string
          readOnly: true
        payload:
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        response_status_code:
          type: integer
          readOnly: true
          nullable: true
        response_body:
          type: string
          readOnly: true
        error_message:
          type: string
          readOnly: true
        attempt_count:
          type: integer
          readOnly: true
        max_attempts:
          type: integer
          readOnly: true
        next_retry_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        delivered_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - attempt_count
      - created_at
      - delivered_at
      - error_message
      - event_type
      - id
      - max_attempts
      - next_retry_at
      - payload
      - response_body
      - response_status_code
      - status
    WebhookRequest:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
          writeOnly: true
          description: Optional project ID. Defaults to the organization's default
            project.
        url:
          type: string
          format: uri
          minLength: 1
          description: Endpoint to send webhook events
          maxLength: 500
        events:
          description: List of event types to subscribe to
        description:
          type: string
        is_active:
          type: boolean
      required:
      - url
  securitySchemes:
    APIKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Organization API Key (hvt_live_* or hvt_test_*)
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Access Token
    jwtCookieAuth:
      type: apiKey
      in: cookie
      name: hvt_access
      description: JWT Access Token Cookie
tags:
- name: Auth
  description: Login, registration, password reset, social OAuth, and token management
- name: Users
  description: User CRUD, role management, and organization membership
- name: Organizations
  description: Organization lifecycle and configuration
- name: API Keys
  description: Create, list, and revoke API keys for server-to-server auth
- name: Webhooks
  description: Configure webhooks for auth event notifications
