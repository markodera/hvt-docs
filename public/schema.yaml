openapi: 3.0.3
info:
  title: HVT Authentication API
  version: 1.0.0
  description: HVT is a REST-first authentication service that serves as an identity
    provider and single source of truth for authentication. It handles user lifecycle
    management, JWT + refresh token auth, social OAuth (Google/GitHub), per-org API
    keys, role-based access control, webhooks, and audit logging.
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Check the credentials and return the REST Token
        if the credentials are valid and authenticated.
        Calls Django Auth login method to register User ID
        in Django session framework

        Accept the following POST parameters: username, password
        Return the REST Framework Token Object's key.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomLoginRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomLogin'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        Calls Django logout method and delete the Token object
        assigned to the current User object.

        Accepts/Returns nothing.
      tags:
      - auth
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestAuthDetail'
          description: ''
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Returns the authenticated user's profile information.
      summary: Get current user profile
      tags:
      - Auth
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_me_update
      description: Replace all editable fields on the current user's profile.
      summary: Update current user profile (full)
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: Partially update the current user's profile.
      summary: Update current user profile (partial)
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: |-
        Calls Django Auth SetPasswordForm save method.

        Accepts the following POST parameters: new_password1, new_password2
        Returns the success/fail message.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChange'
          description: ''
  /api/v1/auth/password/reset/:
    post:
      operationId: auth_password_reset_create
      description: |-
        Calls Django Auth PasswordResetForm save method.

        Accepts the following POST parameters: email
        Returns the success/fail message.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HVTPasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HVTPasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HVTPasswordResetRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HVTPasswordReset'
          description: ''
  /api/v1/auth/password/reset/confirm/{uidb64}/{token}/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Accept reset uid/token from the URL as well as the POST body.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      - in: path
        name: uidb64
        schema:
          type: string
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
  /api/v1/auth/password/reset/validate/:
    post:
      operationId: auth_password_reset_validate_create
      description: Checks whether a password reset uid/token pair is still valid.
      summary: Validate password reset token
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetTokenValidationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetTokenValidationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetTokenValidationRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetTokenValidation'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: Register view with provider-aware error handling for email delivery
        failures.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControlPlaneRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ControlPlaneRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ControlPlaneRegisterRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneRegister'
          description: ''
  /api/v1/auth/register/resend-email/:
    post:
      operationId: auth_register_resend_email_create
      description: |-
        Resends another email to an unverified email.

        Accepts the following POST parameter: email.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendEmailVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendEmailVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendEmailVerificationRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendEmailVerification'
          description: ''
  /api/v1/auth/register/verify-email/:
    post:
      operationId: auth_register_verify_email_create
      description: |-
        Verifies the email associated with the provided key.

        Accepts the following POST parameter: key.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/runtime/login/:
    post:
      operationId: auth_runtime_login_create
      description: Authenticate an end user within the organization identified by
        the provided X-API-Key.
      summary: Runtime login
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RuntimeLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RuntimeLoginRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeLogin'
          description: ''
  /api/v1/auth/runtime/register/:
    post:
      operationId: auth_runtime_register_create
      description: |-
        Register an end user within the organization and project identified by the provided X-API-Key.

        Verification emails are currently sent from HVT's email infrastructure. Per-project sender branding — custom domain, sender name, and templates — is planned for Builder tier and above.
      summary: Runtime register
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RuntimeRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RuntimeRegisterRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeRegister'
          description: ''
  /api/v1/auth/runtime/social/github/:
    post:
      operationId: auth_runtime_social_github_create
      description: API-key-scoped social login flow for customer-facing app users.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeSocialLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RuntimeSocialLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RuntimeSocialLoginRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSocialLogin'
          description: ''
  /api/v1/auth/runtime/social/google/:
    post:
      operationId: auth_runtime_social_google_create
      description: API-key-scoped social login flow for customer-facing app users.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeSocialLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RuntimeSocialLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RuntimeSocialLoginRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSocialLogin'
          description: ''
  /api/v1/auth/runtime/social/providers/:
    get:
      operationId: auth_runtime_social_providers_retrieve
      description: List active project-scoped runtime social providers configuration
        that match the API Key.
      summary: List runtime social providers
      tags:
      - Auth
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/social/github/:
    post:
      operationId: auth_social_github_create
      description: |-
        class used for social authentications
        example usage for facebook with access_token
        -------------
        from allauth.socialaccount.providers.facebook.views import FacebookOAuth2Adapter

        class FacebookLogin(SocialLoginView):
            adapter_class = FacebookOAuth2Adapter
        -------------

        example usage for facebook with code

        -------------
        from allauth.socialaccount.providers.facebook.views import FacebookOAuth2Adapter
        from allauth.socialaccount.providers.oauth2.client import OAuth2Client

        class FacebookLogin(SocialLoginView):
            adapter_class = FacebookOAuth2Adapter
            client_class = OAuth2Client
            callback_url = 'localhost:8000'
        -------------
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomSocialLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomSocialLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomSocialLoginRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomSocialLogin'
          description: ''
  /api/v1/auth/social/google/:
    post:
      operationId: auth_social_google_create
      description: |-
        class used for social authentications
        example usage for facebook with access_token
        -------------
        from allauth.socialaccount.providers.facebook.views import FacebookOAuth2Adapter

        class FacebookLogin(SocialLoginView):
            adapter_class = FacebookOAuth2Adapter
        -------------

        example usage for facebook with code

        -------------
        from allauth.socialaccount.providers.facebook.views import FacebookOAuth2Adapter
        from allauth.socialaccount.providers.oauth2.client import OAuth2Client

        class FacebookLogin(SocialLoginView):
            adapter_class = FacebookOAuth2Adapter
            client_class = OAuth2Client
            callback_url = 'localhost:8000'
        -------------
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomSocialLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomSocialLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomSocialLoginRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomSocialLogin'
          description: ''
  /api/v1/auth/social/providers/:
    get:
      operationId: auth_social_providers_retrieve
      description: List active generic social auth providers configuration.
      summary: List control-plane social providers
      tags:
      - Auth
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: JWT refresh view that preserves HVT org/project claim validation.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HVTCookieTokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HVTCookieTokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HVTCookieTokenRefreshRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HVTCookieTokenRefresh'
          description: ''
  /api/v1/auth/user/:
    get:
      operationId: auth_user_retrieve
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - auth
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
    put:
      operationId: auth_user_update
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDetailsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDetailsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserDetailsRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
    patch:
      operationId: auth_user_partial_update
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserDetailsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserDetailsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserDetailsRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
  /api/v1/organizations/:
    get:
      operationId: organizations_list
      description: List all organizations. Superuser only.
      summary: List all organizations
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Organizations
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationList'
          description: ''
    post:
      operationId: organizations_create
      description: Create a new organization. The authenticated user becomes the owner.
        Single organization per user at launch.
      summary: Create an organization
      tags:
      - Organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
  /api/v1/organizations/{id}/:
    get:
      operationId: organizations_retrieve
      description: Get organization details by ID. Superuser only.
      summary: Retrieve an organization
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Organizations
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
    put:
      operationId: organizations_update
      description: Replace all editable fields. Superuser only.
      summary: Update an organization (full)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
        required: true
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
    patch:
      operationId: organizations_partial_update
      description: Partially update an organization. Superuser only.
      summary: Update an organization (partial)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
    delete:
      operationId: organizations_destroy
      description: Delete an organization and all related data. Superuser only.
      summary: Delete an organization
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Organizations
      security:
      - jwtCookieAuth: []
      - BearerAuth: []
      - APIKeyAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/organizations/current/:
    get:
      operationId: organizations_current_retrieve
      description: Returns the organization for the authenticated user or API key.
      summary: Get current organization
      tags:
